name: Update Index HTML
on:
  repository_dispatch:
    types: [update-index]
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and update
        run: |
          curl -sL "${{ github.event.client_payload.url }}" -o index.html
          wc -c index.html
      - name: Commit
        run: |
          git config user.name 'atlas-bot'
          git config user.email 'bot@atlas.com'
          git add index.html
          git diff --cached --quiet || git commit -m 'Update index.html via workflow'
          git push
